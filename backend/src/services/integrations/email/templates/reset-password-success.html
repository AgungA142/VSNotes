<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Berhasil Diubah — VSNotes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f4f4f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .logo { font-size: 13px; font-weight: 600; color: #4f46e5; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    h1 { font-size: 20px; color: #111827; margin-bottom: 12px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.7; margin-bottom: 8px; }
    .badge { display: inline-block; background: #ecfdf5; color: #065f46; border-radius: 999px; padding: 4px 14px; font-size: 13px; font-weight: 500; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">VSNotes</div>
    <div class="icon">&#x2705;</div>
    <h1>Password Berhasil Diubah</h1>
    <span class="badge">Akun Anda aman</span>
    <p>Password baru Anda telah disimpan. Semua sesi yang sedang aktif telah diakhiri.</p>
    <p>Silakan kembali ke aplikasi desktop dan login menggunakan password baru Anda.</p>
  </div>
</body>
</html>
