<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tautan Tidak Valid — VSNotes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f4f4f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .logo { font-size: 13px; font-weight: 600; color: #4f46e5; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    h1 { font-size: 20px; color: #111827; margin-bottom: 12px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.7; margin-bottom: 24px; }
    .reason { font-size: 13px; color: #b91c1c; background: #fef2f2; border-radius: 6px; padding: 10px 14px; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 10px 24px; background: #4f46e5; color: #fff; text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: 600; }
    .btn:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">VSNotes</div>
    <div class="icon">&#x26A0;&#xFE0F;</div>
    <h1>Tautan Tidak Valid</h1>
    <div class="reason">{{errorMessage}}</div>
    <p>Minta tautan reset password baru melalui aplikasi desktop dengan mengklik "Lupa Password?" di halaman login.</p>
  </div>
</body>
</html>
