<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password â€” VSNotes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f4f4f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .logo { font-size: 14px; font-weight: 600; color: #4f46e5; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    h1 { font-size: 22px; color: #111827; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.6; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type="password"] { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; color: #111827; outline: none; transition: border-color 0.15s; margin-bottom: 16px; }
    input[type="password"]:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    button[type="submit"] { width: 100%; padding: 11px; background: #4f46e5; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    button[type="submit"]:hover { background: #4338ca; }
    .hint { font-size: 12px; color: #9ca3af; margin-top: 16px; text-align: center; }
    .error-msg { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">VSNotes</div>
    <h1>Buat Password Baru</h1>
    <p>Masukkan password baru untuk akun Anda. Gunakan minimal 8 karakter dengan 1 huruf kapital dan 1 angka atau simbol.</p>

    <div id="errorMsg" class="error-msg">{{errorMessage}}</div>

    <form method="POST" action="/v1/auth/reset-password" onsubmit="return validate()">
      <input type="hidden" name="token" value="{{token}}">

      <label for="password">Password Baru</label>
      <input type="password" id="password" name="password" placeholder="Minimal 8 karakter" required autocomplete="new-password">

      <label for="confirmPassword">Konfirmasi Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Ulangi password baru" required autocomplete="new-password">

      <button type="submit">Simpan Password Baru</button>
    </form>

    <p class="hint">Tautan ini hanya berlaku satu kali.</p>
  </div>
  <script>
    // Tampilkan error dari server jika ada
    const errorMsg = document.getElementById('errorMsg');
    if ('{{errorMessage}}' !== '') errorMsg.classList.add('show');

    function validate() {
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirmPassword').value;
      if (pw !== cpw) {
        errorMsg.textContent = 'Password dan konfirmasi password tidak cocok.';
        errorMsg.classList.add('show');
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
